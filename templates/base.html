<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Silversea Market Intelligence{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0a2540',
            'navy-light': '#1a3a5c',
            'green-accent': '#2d6a4f',
            'green-accent-light': '#40916c',
            'score-high': '#16a34a',
            'score-medium': '#d97706',
            'score-low': '#6b7280',
            'bg-page': '#f8fafc',
            'bg-card': '#ffffff',
            'border-card': '#e2e8f0',
          },
          fontFamily: {
            display: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body class="bg-bg-page font-display text-gray-800 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-navy text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-2">
          <span class="text-xl font-bold tracking-tight">Silversea Media</span>
          <span class="text-sm text-gray-300 hidden sm:inline">Market Intelligence</span>
        </div>
        <div class="flex gap-1">
          <a href="/" class="px-4 py-2 rounded-md text-sm font-medium transition-colors
            {% if request.path == '/' %}bg-white/15 text-white{% else %}text-gray-300 hover:text-white hover:bg-white/10{% endif %}">
            Report
          </a>
          <a href="/internals" class="px-4 py-2 rounded-md text-sm font-medium transition-colors
            {% if request.path == '/internals' %}bg-white/15 text-white{% else %}text-gray-300 hover:text-white hover:bg-white/10{% endif %}">
            Internals
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Country tabs -->
  <div class="bg-white border-b border-border-card">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex gap-4 py-2">
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium bg-green-accent text-white">
          <span class="w-2 h-2 rounded-full bg-green-300 inline-block"></span>
          Singapore
        </span>
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-400 cursor-not-allowed">
          Malaysia
        </span>
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-400 cursor-not-allowed">
          Vietnam
        </span>
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-sm font-medium bg-gray-100 text-gray-400 cursor-not-allowed">
          Indonesia
        </span>
      </div>
    </div>
  </div>

  <!-- Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-border-card mt-12 py-6 text-center text-sm text-gray-400">
    Auto-generated by Silversea Market Intelligence System
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
